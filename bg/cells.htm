<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑀|𝒮ʸˢᵗᵉᵐ 𝒮ᵒˡᵘᵗⁱᵒⁿˢ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanta/0.5.21/vanta.cells.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>
<script>
    let colors = [
        0x0b467d,
        0x4a008c,
        0x83008c,
        0x8c0008,
        0x8c4100,
        0x8c8b00,
        0x8c39
    ];

    let colorIndex = 0;

    const interpolateColor = (color1, color2, factor) => {
        let result = color1.map((c, i) => Math.round(c + factor * (color2[i] - c)));
        return `0x${result.map(c => c.toString(16).padStart(2, '0')).join('')}`;
    };

    const hexToRgb = (hex) => {
        let bigint = parseInt(hex, 16);
        return [bigint >> 16 & 255, bigint >> 8 & 255, bigint & 255];
    };

    const transitionColor = () => {
        let currentColor = hexToRgb(colors[colorIndex].toString(16).padStart(6, '0'));
        let nextColorIndex = (colorIndex + 1) % colors.length;
        let nextColor = hexToRgb(colors[nextColorIndex].toString(16).padStart(6, '0'));
        let steps = 100;
        let step = 0;

        const updateColor = () => {
            let factor = step / steps;
            let interpolatedColor = interpolateColor(currentColor, nextColor, factor);
            vantaEffect.setOptions({
                color1: parseInt(interpolatedColor, 16),
                color2: parseInt(interpolatedColor, 16) // Keep color2 the same for a smoother transition
            });
            step++;
            if (step <= steps) {
                requestAnimationFrame(updateColor);
            } else {
                colorIndex = nextColorIndex;
            }
        };

        updateColor();
    };

    let vantaEffect = VANTA.CELLS({
        el: "body",
        color1: colors[colorIndex],
        color2: colors[colorIndex], // Start with the same color
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        scale: 1.00,
    });

    setInterval(transitionColor, 4000); // Change color every 4 seconds
</script>
</body>
</html>
