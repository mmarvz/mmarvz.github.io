<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑀|𝒮ʸˢᵗᵉᵐ 𝒮ᵒˡᵘᵗⁱᵒⁿˢ</title>
    <style>
        body,
        html,
        #app {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        #app canvas {
            display: block;
            position: fixed;
            z-index: -1;
            top: 0;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { butterfliesBackground } from "https://unpkg.com/threejs-toys@0.0.7/build/threejs-toys.module.cdn.min.js";

        const root = document.getElementById("app");
        const body = document.body;


        const textureUrl = "https://i.ibb.co/2YB8msn/butterflies8.png";
        const options = {
            el: root,
            eventsEl: body,
            gpgpuSize: 20,
            background: 0x0B467D,
            material: "basic",
            materialParams: {
                transparent: true,
                alphaTest: 0.5,
            },
            textureCount: 8,
            wingscale: [1, 1, 1],
            wingsWidthSegments: 10,
            wingsHeightSegments: 10,
            wingsSpeed: 2,
            wingsDisplacementScale: 2,
            noiseCoordScale: 0.01,
            noiseTimeCoef: 0.005,
            noiseIntensity: 0.0025,
            attractionRadius1: 100,
            attractionRadius2: 100,
            maxVelocity: 0.2,
        };


        options.texture = textureUrl;


        butterfliesBackground(options);

    </script>
</body>
</html>
